<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Igreja Essência - Política de Privacidade</title>
  <meta name="description" content="Política de Privacidade do aplicativo Igreja Essência." />
  <style>
    :root { color-scheme: light; --bg: #f6f8fb; --surface: #ffffff; --text: #17202a; --muted: #5d6b7a; --accent: #078aa0; --border: #d9e2ea; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    main { max-width: 920px; margin: 0 auto; padding: 48px 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; box-shadow: 0 10px 30px rgba(16, 32, 48, 0.08); }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3.4rem); line-height: 1.1; }
    p { margin: 0 0 18px; color: var(--muted); font-size: 1.05rem; }
    a { color: var(--accent); font-weight: 700; }
    .button { display: inline-block; margin-top: 10px; padding: 12px 18px; border-radius: 10px; background: var(--accent); color: #fff; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Igreja Essência</h1>
      <p>Esta página reúne documentos públicos relacionados ao aplicativo Igreja Essência.</p>
      <p>A política de privacidade descreve como dados pessoais são tratados no app e na área administrativa interna.</p>
      <a class="button" href="./politica-de-privacidade/">Abrir Política de Privacidade</a>
    </section>
  </main>
</body>
</html>
